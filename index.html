<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Sổ cấp GCN</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:30px;
background:#f2f4f8;
}

input{
padding:6px;
margin:3px;
}

button{
padding:6px 10px;
background:#1976d2;
border:none;
color:white;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:6px;
}

th{
background:#1976d2;
color:white;
}

</style>

</head>

<body>

<h2>Sổ cấp GCN</h2>

<div id="login">

<h3>Đăng nhập</h3>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mật khẩu"><br>

<button onclick="login()">Đăng nhập</button>

</div>

<div id="app" style="display:none">

<h3>Nhập dữ liệu</h3>

<input id="stt" placeholder="STT">
<input id="ten" placeholder="Tên người được cấp">
<input id="so_phat_hanh" placeholder="Số phát hành">
<input id="ngay_ky" placeholder="Ngày ký">
<input id="ngay_trao" placeholder="Ngày trao">
<input id="so_vao_so" placeholder="Số vào sổ">
<input id="nguoi_nhan" placeholder="Người nhận">
<input id="ghi_chu" placeholder="Ghi chú">
<input id="so_vao_so2" placeholder="Số vào sổ 2">

<button onclick="addData()">Lưu</button>

<br><br>

<input id="search" placeholder="Tìm kiếm">

<table>

<thead>

<tr>

<th>STT</th>
<th>Tên</th>
<th>Số phát hành</th>
<th>Ngày ký</th>
<th>Ngày trao</th>
<th>Số vào sổ</th>
<th>Người nhận</th>
<th>Ghi chú</th>
<th>Số vào sổ 2</th>
<th>Thao tác</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script src="js/supabase.js"></script>
<script src="js/app.js"></script>

</body>
</html>
